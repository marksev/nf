name: blocky_blast
description: Blocky Blast Puzzle Game - HTML to Flutter
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.3
  audioplayers: ^6.0.0
  google_mobile_ads: ^5.1.0

dev_dependencies:
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/pickup.mp3
    - assets/sounds/place.mp3
    - assets/sounds/clear.mp3
    - assets/sounds/denied.mp3
